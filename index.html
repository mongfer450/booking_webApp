<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariza Booking - Smart System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f8; }
        .card { border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .tab-active { color: #db2777; border-bottom: 3px solid #db2777; transition: all 0.3s; }
        input, select { font-size: 16px !important; }
        .suggestion-box { z-index: 50; max-height: 150px; overflow-y: auto; }
        .fast-loader { border: 3px solid #f3f3f3; border-top: 3px solid #db2777; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ปรับเงาของกล่องคิว */
        .queue-item { border-radius: 20px; box-shadow: 0 4px 12px rgba(219, 39, 119, 0.03); border: 1px solid #fce7f3; }
    </style>
</head>
<body class="p-4 pb-10">
    <div class="max-w-md mx-auto bg-white card overflow-hidden">
        <div class="flex border-b text-sm">
            <button onclick="switchTab('booking')" id="tab-booking" class="flex-1 py-4 font-bold tab-active">หน้าจอง</button>
            <button onclick="switchTab('queue')" id="tab-queue" class="flex-1 py-4 font-bold text-gray-400">ตารางคิว (Live)</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-4 font-bold text-gray-400">ประวัติลูกค้า</button>
        </div>

        <div class="p-6">
            <div id="section-booking">
                <form id="bookingForm" class="space-y-4" autocomplete="off">
                    <div class="grid grid-cols-2 gap-3">
                        <select id="msgLang" onchange="updatePreview()" class="rounded-xl border-pink-100 bg-pink-50 p-3 border text-pink-600 font-bold text-sm">
                            <option value="th">🇹🇭 ไทย</option>
                            <option value="en">🇺🇸 ENG</option>
                        </select>
                        <select id="platform" onchange="updatePreview()" class="rounded-xl border-gray-200 bg-gray-50 p-3 border text-sm">
                            <option value="LineOA">LineOA</option>
                            <option value="FB">FB</option>
                            <option value="IG">IG</option>
                        </select>
                    </div>

                    <div class="relative">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">ชื่อลูกค้า *</label>
                        <input type="text" id="custName" oninput="handleNameInput()" required placeholder="พิมพ์ชื่อ..." class="w-full rounded-xl border-gray-200 border p-3 outline-none focus:border-pink-300">
                        <div id="suggestions" class="hidden absolute left-0 right-0 mt-1 bg-white border rounded-xl shadow-xl suggestion-box"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">เบอร์โทรศัพท์ *</label>
                            <input type="tel" id="custPhone" oninput="updatePreview()" pattern="[0-9]{10}" required placeholder="09xxxxxxxx" class="w-full rounded-xl border-gray-200 border p-3">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">บริการ (Service)</label>
                            <input type="text" id="serviceType" oninput="updatePreview()" placeholder="ต่อขนตา" class="w-full rounded-xl border-gray-200 border p-3">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">วันที่นัด *</label>
                            <input type="date" id="date" onchange="updatePreview()" required class="w-full rounded-xl border-gray-200 border p-3 text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">เวลานัด *</label>
                            <input type="time" id="time" onchange="updatePreview()" required class="w-full rounded-xl border-gray-200 border p-3 text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">ประเภทงาน</label>
                        <select id="locationType" onchange="updateDeposit(); updatePreview();" class="w-full rounded-xl border-gray-200 bg-gray-50 p-3 border font-bold">
                            <option value="default">ในสถานที่</option>
                            <option value="onsite">นอกสถานที่</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4 border-t pt-4">
                        <input type="text" id="price" oninput="updatePreview()" placeholder="ราคาเต็ม" class="rounded-xl border-gray-200 border p-3">
                        <input type="number" id="deposit" oninput="updatePreview()" value="500" class="rounded-xl border-gray-200 border p-3 font-bold text-pink-600">
                    </div>

                    <div class="pt-2 space-y-3">
                        <button type="button" onclick="generateAndCopy()" class="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all">คัดลอกข้อความ 📋</button>
                        <button type="button" id="btnSave" onclick="sendToCalendar()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all">ลงปฏิทิน & บันทึก 🗓️</button>
                    </div>
                </form>

                <div class="mt-6 border-t pt-4">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">ตัวอย่างข้อความ</p>
                    <div id="textPreview" class="bg-gray-50 p-4 rounded-2xl border border-dashed border-gray-300 text-[13px] whitespace-pre-wrap text-gray-500 min-h-[80px]"></div>
                </div>
            </div>

            <div id="section-queue" class="hidden space-y-4">
                <div class="bg-pink-50 p-4 rounded-2xl">
                    <div class="flex gap-2">
                        <input type="date" id="queueDateFilter" onchange="fetchGoogleQueue()" class="flex-1 rounded-xl border-pink-100 border p-2 text-sm focus:outline-none">
                        <button onclick="fetchGoogleQueue()" class="bg-pink-500 text-white px-4 rounded-xl text-xs font-bold">🔄</button>
                    </div>
                </div>
                <div id="queueList" class="space-y-3"></div>
            </div>

            <div id="section-history" class="hidden space-y-3">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-gray-700 text-sm">รายการล่าสุด</h3>
                    <button onclick="clearHistory()" class="text-[10px] text-red-500 font-bold">ล้างประวัติ</button>
                </div>
                <div id="historyList" class="space-y-3"></div>
            </div>
        </div>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwmM7ck23L33kK_sjG_Fla3Ka5eDAbfJMsQmVED4cQAj8u8isASx7XLH7j0flYEa7-I/exec';
    let queueCache = {}; 

    function switchTab(tab) {
        document.getElementById('section-booking').classList.toggle('hidden', tab !== 'booking');
        document.getElementById('section-queue').classList.toggle('hidden', tab !== 'queue');
        document.getElementById('section-history').classList.toggle('hidden', tab !== 'history');
        
        document.getElementById('tab-booking').className = tab === 'booking' ? 'flex-1 py-4 font-bold tab-active' : 'flex-1 py-4 font-bold text-gray-400';
        document.getElementById('tab-queue').className = tab === 'queue' ? 'flex-1 py-4 font-bold tab-active' : 'flex-1 py-4 font-bold text-gray-400';
        document.getElementById('tab-history').className = tab === 'history' ? 'flex-1 py-4 font-bold tab-active' : 'flex-1 py-4 font-bold text-gray-400';
        
        if(tab === 'history') loadHistory();
        if(tab === 'queue') {
            const qDate = document.getElementById('queueDateFilter');
            if(!qDate.value) qDate.value = new Date().toISOString().split('T')[0];
            fetchGoogleQueue();
        }
    }

    function handleNameInput() {
        const input = document.getElementById('custName').value.toLowerCase();
        const suggestionsBox = document.getElementById('suggestions');
        updatePreview();
        if (input.length < 1) { suggestionsBox.classList.add('hidden'); return; }
        const history = JSON.parse(localStorage.getItem('marizaHistoryData') || '[]');
        const matches = history.filter((item, index, self) => 
            item.name.toLowerCase().includes(input) && 
            self.findIndex(t => t.name === item.name) === index
        );
        if (matches.length > 0) {
            suggestionsBox.innerHTML = matches.slice(0, 5).map(data => `
                <div onclick="fillData({name:'${data.name}', phone:'${data.phone}', locType:'${data.locType}'})" class="p-3 hover:bg-pink-50 cursor-pointer border-b border-gray-50 last:border-0 text-sm flex justify-between items-center">
                    <span class="font-bold text-pink-600">${data.name}</span> <span class="text-gray-400 text-[10px]">${data.phone}</span>
                </div>
            `).join('');
            suggestionsBox.classList.remove('hidden');
        } else { suggestionsBox.classList.add('hidden'); }
    }

    function fillData(data) {
        document.getElementById('custName').value = data.name;
        document.getElementById('custPhone').value = data.phone;
        document.getElementById('locationType').value = data.locType || 'default';
        document.getElementById('suggestions').classList.add('hidden');
        updateDeposit(); updatePreview();
    }

    function updateDeposit() {
        const type = document.getElementById('locationType').value;
        document.getElementById('deposit').value = (type === 'onsite') ? 1000 : 500;
    }

    function generateData() {
        const lang = document.getElementById('msgLang').value;
        const name = document.getElementById('custName').value || '...';
        const phone = document.getElementById('custPhone').value || '...';
        const service = document.getElementById('serviceType').value || 'ต่อขนตา';
        const dateInput = document.getElementById('date').value;
        const [y, m, d] = dateInput ? dateInput.split('-') : ['xxxx','xx','xx'];
        const dateStr = `${d}/${m}/${y}`;
        const time = document.getElementById('time').value || '--:--';
        const platform = document.getElementById('platform').value;
        const price = document.getElementById('price').value || 'ราคา';
        const deposit = document.getElementById('deposit').value;
        const locType = document.getElementById('locationType').value;

        let text = (lang === 'th') 
            ? `ยืนยันการจอง💓\nมัดจำ ${deposit} บาท\n\nชื่อ: ${name}\nเบอร์: ${phone}\nบริการ: ${service}\nวันที่: ${dateStr}\nเวลา: ${time}\n\n`
            : `Confirm Booking💓\nDeposit: ${deposit} THB\n\nName: ${name}\nPhone: ${phone}\nService: ${service}\nDate: ${dateStr}\nTime: ${time}\n\n`;

        text += (locType === 'onsite') 
            ? (lang === 'th' ? `- เวลาอาจคลาดเคลื่อนตามการจราจรค่า🙏\n🥰 แล้วพบกันค่า 🫶💖` : `- Traffic may affect time ka🙏\n🥰 See you soon! 🫶💖`)
            : (lang === 'th' ? `- หากนำรถมาแจ้งเลขห้อง 964 ค่า\n- ถึงแล้วนั่งรอ lobby เดี๋ยวมีพี่ช่างมารับค่า\n- Oops! ถ้าเลทมาไม่เกิน 15 นาที นะคะ🥰 แล้วพบกันนะค่า🫶💖` : `- Room 964 ka\n- Wait at Lobby ka💖\n- Late max 15 mins ka🫶💖`);

        const calLine = `${name} | ${platform} | ${phone} | ${price}(มัดจำ${deposit}) | ${service}`;
        return { text, calLine, name, phone, locType, dateInput, time, dateStr };
    }

    function updatePreview() {
        const { text } = generateData();
        document.getElementById('textPreview').innerText = text || "รอข้อมูล...";
    }

    async function generateAndCopy() {
        const { text } = generateData();
        await navigator.clipboard.writeText(text);
        alert('คัดลอกเรียบร้อย! ✅');
    }

    async function sendToCalendar() {
        const form = document.getElementById('bookingForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }
        const btn = document.getElementById('btnSave');
        btn.innerHTML = '<div class="fast-loader mx-auto"></div>'; btn.disabled = true;
        const data = generateData();
        saveToHistory(data);
        const formData = new FormData();
        formData.append('date', data.dateInput);
        formData.append('time', data.time);
        formData.append('calendarLine', data.calLine);
        try {
            await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            alert('ลงปฏิทินสำเร็จ! 🗓️');
            delete queueCache[data.dateInput];
            form.reset(); updatePreview();
        } catch (e) { alert('ส่งไม่สำเร็จ'); }
        finally { btn.innerText = "ลงปฏิทิน & บันทึก 🗓️"; btn.disabled = false; }
    }

    function saveToHistory(data) {
        let history = JSON.parse(localStorage.getItem('marizaHistoryData') || '[]');
        history.unshift({ name: data.name, phone: data.phone, locType: data.locType, line: data.calLine, bookingDate: data.dateStr, bookingTime: data.time });
        localStorage.setItem('marizaHistoryData', JSON.stringify(history.slice(0, 100)));
    }

    function loadHistory() {
        const list = document.getElementById('historyList');
        const history = JSON.parse(localStorage.getItem('marizaHistoryData') || '[]');
        list.innerHTML = history.length ? history.map(item => `
            <div class="p-3 bg-pink-50 rounded-xl text-[11px] border border-pink-100 shadow-sm flex justify-between items-center">
                <div class="truncate mr-2"><span class="font-bold">${item.name}</span> | ${item.line}</div>
                <button onclick="navigator.clipboard.writeText('${item.line}'); alert('คัดลอกแล้ว!')" class="text-pink-600 font-bold">📋</button>
            </div>
        `).join('') : '<p class="text-center py-10 text-gray-300 text-xs">ไม่มีข้อมูล</p>';
    }

    function clearHistory() { if(confirm('ล้างทั้งหมด?')) { localStorage.removeItem('marizaHistoryData'); loadHistory(); } }

    async function fetchGoogleQueue() {
        const list = document.getElementById('queueList');
        const selectedDate = document.getElementById('queueDateFilter').value;
        if (queueCache[selectedDate]) { renderQueue(queueCache[selectedDate]); silentUpdate(selectedDate); return; }
        list.innerHTML = '<div class="flex justify-center py-10"><div class="fast-loader"></div></div>';
        try {
            const response = await fetch(`${scriptURL}?action=getQueue&date=${selectedDate}`);
            const data = await response.json();
            queueCache[selectedDate] = data;
            renderQueue(data);
        } catch (e) { list.innerHTML = '<p class="text-center py-10 text-red-400">Error Loading.</p>'; }
    }

    async function silentUpdate(date) {
        try {
            const response = await fetch(`${scriptURL}?action=getQueue&date=${date}`);
            const data = await response.json();
            queueCache[date] = data;
            renderQueue(data);
        } catch (e) {}
    }

    function renderQueue(data) {
        const list = document.getElementById('queueList');
        if (!data || data.length === 0) { list.innerHTML = '<p class="text-center py-10 text-gray-400 text-xs">ไม่มีคิวงาน</p>'; return; }

        list.innerHTML = data.map((item, index) => {
            const isDone = item.status === "DONE";
            const parts = item.title.split(' | ');
            return `
                <div class="queue-item overflow-hidden transition-all ${isDone ? 'bg-gray-50 opacity-60' : 'bg-white'}">
                    <div onclick="toggleAccordion('desc-${index}')" class="p-4 flex justify-between items-center cursor-pointer active:bg-pink-50">
                        <div class="flex gap-3 items-center overflow-hidden">
                            <div class="${isDone ? 'text-gray-400 bg-gray-200' : 'text-pink-600 bg-pink-50'} font-bold text-xs p-2 rounded-xl min-w-[55px] text-center">${item.startTime}</div>
                            <div class="overflow-hidden">
                                <div class="text-gray-800 font-bold text-sm truncate ${isDone ? 'line-through' : ''}">${parts[0] || 'Unknown'}</div>
                                <div class="text-[10px] text-gray-400 truncate w-full max-w-[150px]">${item.title}</div>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleStatus('${item.id}', '${item.status}')" class="p-2 rounded-full ${isDone ? 'bg-green-500 text-white' : 'bg-pink-100 text-pink-500'}">
                            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
                        </button>
                    </div>
                    <div id="desc-${index}" class="hidden bg-pink-50/20 border-t border-dashed border-pink-100 p-4">
                        <div class="grid grid-cols-2 gap-3 text-[11px]">
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Phone</span><span class="text-gray-700 font-bold">${parts[2] || '-'}</span></div>
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Price</span><span class="text-pink-600 font-bold">${parts[3] || '-'}</span></div>
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Platform</span><span class="text-gray-700 font-bold">${parts[1] || '-'}</span></div>
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Service</span><span class="text-gray-700 font-bold">${parts[4] || '-'}</span></div>
                        </div>
                        <div class="mt-3 bg-gray-800 text-gray-300 p-2 rounded-lg text-[9px] font-mono break-all select-all">${item.title}</div>
                    </div>
                </div>`;
        }).join('');
    }

    function toggleAccordion(id) { document.getElementById(id).classList.toggle('hidden'); }

    async function toggleStatus(eventId, currentStatus) {
        const newStatus = (currentStatus === "DONE") ? "[WAIT]" : "[DONE]";
        const formData = new FormData();
        formData.append('action', 'updateStatus');
        formData.append('eventId', eventId);
        formData.append('status', newStatus);
        try {
            await fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' });
            const selectedDate = document.getElementById('queueDateFilter').value;
            delete queueCache[selectedDate];
            fetchGoogleQueue();
        } catch (e) { alert("Error"); }
    }
</script>
</body>
</html>
