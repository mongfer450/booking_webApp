<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Hello.mirilash - Booking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
            color-profile: sRGB;
            -webkit-font-smoothing: antialiased;
            }
      @import url("https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap");
      body { font-family: "Kanit", sans-serif; background-color: #fdf2f8; }
      .card { border-radius: 24px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); }
      .tab-active { color: #db2777; border-bottom: 3px solid #db2777; transition: all 0.3s; }
      input, select { font-size: 16px !important; }
      .suggestion-box { z-index: 50; max-height: 150px; overflow-y: auto; }
      .fast-loader { border: 3px solid #f3f3f3; border-top: 3px solid #db2777; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .queue-item { border-radius: 20px; box-shadow: 0 4px 12px rgba(219, 39, 119, 0.03); border: 1px solid #fce7f3; }
    </style>
  </head>
  <body class="p-4 pb-10">
    <div class="max-w-md mx-auto bg-white card overflow-hidden">
      <div class="flex border-b text-sm">
        <button onclick="switchTab('booking')" id="tab-booking" class="flex-1 py-4 font-bold tab-active">หน้าจอง</button>
        <button onclick="switchTab('queue')" id="tab-queue" class="flex-1 py-4 font-bold text-gray-400">ตารางคิว (Live)</button>
        <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-4 font-bold text-gray-400">ประวัติลูกค้า</button>
      </div>

      <div class="p-6">
        <div id="section-booking" class="animate-fadeIn">
          <form id="bookingForm" class="space-y-5 p-4" autocomplete="off">
            <div class="grid grid-cols-2 gap-3 pb-2">
              <div class="relative group">
                <select id="msgLang" onchange="updatePreview()" class="w-full rounded-2xl border-none bg-pink-50 p-3.5 text-pink-600 font-bold text-sm appearance-none shadow-sm focus:ring-2 focus:ring-pink-300 transition-all">
                  <option value="th">🇹🇭 ภาษาไทย</option>
                  <option value="en">🇺🇸 English</option>
                </select>
                <div class="absolute right-3 top-4 pointer-events-none text-pink-300 text-[10px]">▼</div>
              </div>
              <div class="relative group">
                <select id="platform" onchange="updatePreview()" class="w-full rounded-2xl border-none bg-slate-100 p-3.5 text-slate-600 font-bold text-sm appearance-none shadow-sm focus:ring-2 focus:ring-slate-300 transition-all">
                  <option value="LineOA">LineOA</option>
                  <option value="FB">FB</option>
                  <option value="IG">IG</option>
                </select>
                <div class="absolute right-3 top-4 pointer-events-none text-slate-400 text-[10px]">▼</div>
              </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-100 p-4 shadow-sm space-y-4">
              <div class="relative">
                <label class="flex items-center gap-1 text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5">
                  <span>👤</span> ชื่อลูกค้า <span class="text-pink-500">*</span>
                </label>
                <input type="text" id="custName" oninput="handleNameInput()" required placeholder="ระบุชื่อลูกค้า..." class="w-full rounded-xl border-slate-200 border-2 p-3.5 outline-none focus:border-pink-400 focus:ring-4 focus:ring-pink-50 transition-all text-lg font-medium" />
                <div id="suggestions" class="hidden absolute left-0 right-0 z-20 mt-2 bg-white border border-slate-100 rounded-2xl shadow-2xl overflow-hidden max-h-48 overflow-y-auto"></div>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5 block">📱 เบอร์โทรศัพท์</label>
                  <input type="tel" id="custPhone" oninput="validatePhone(this); updatePreview();" required placeholder="09xxxxxxxx" maxlength="10" class="w-full rounded-xl border-slate-200 border p-3.5 focus:border-slate-400 outline-none transition-all" />
                </div>
                <div>
                  <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5 block">📍 สถานที่</label>
                  <select id="locationType" onchange="updateDeposit(); updatePreview();" class="w-full rounded-xl border-slate-200 border p-3.5 font-bold bg-slate-50">
                    <option value="default">🏠 ในสถานที่</option>
                    <option value="onsite">🚗 นอกสถานที่</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="bg-slate-50 rounded-3xl p-4 space-y-4">
              <div>
                <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5 block">✂️ บริการที่ได้รับ</label>
                <input type="text" id="serviceType" oninput="updatePreview()" placeholder="ต่อขนตา" class="w-full rounded-xl border-slate-200 border p-3.5 focus:border-slate-400 outline-none transition-all" />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5 block">📅 วันที่นัด</label>
                  <input type="date" id="date" onchange="updatePreview()" required class="w-full rounded-xl border-slate-200 border p-3.5 text-sm font-medium focus:border-slate-400 outline-none" />
                </div>
                <div>
                  <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5 block">⏰ เวลานัด</label>
                  <input type="time" id="time" onchange="updatePreview()" required class="w-full rounded-xl border-slate-200 border p-3.5 text-sm font-medium focus:border-slate-400 outline-none" />
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4 border-t border-slate-200 pt-4">
                <div class="relative">
                  <label class="text-[11px] font-bold text-slate-400 uppercase ml-1 mb-1.5 block">ราคาเต็ม</label>
                  <div class="relative">
                    <span class="absolute left-3 top-3.5 text-slate-400 text-sm">฿</span>
                    <input type="number" id="price" oninput="updatePreview()" placeholder="0" class="w-full rounded-xl border-slate-200 border p-3.5 pl-7 outline-none focus:border-slate-400" />
                  </div>
                </div>
                <div class="relative">
                  <label class="text-[11px] font-bold text-pink-500 uppercase ml-1 mb-1.5 block">มัดจำ</label>
                  <div class="relative">
                    <span class="absolute left-3 top-3.5 text-pink-400 text-sm">฿</span>
                    <input type="number" id="deposit" oninput="updatePreview()" value="500" class="w-full rounded-xl border-pink-200 border-2 p-3.5 pl-7 font-bold text-pink-600 outline-none focus:border-pink-400 bg-white" />
                  </div>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 gap-3 pt-2">
              <button type="button" onclick="generateAndCopy()" class="w-full bg-white border-2 border-pink-500 text-pink-600 font-bold py-4 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 shadow-sm">คัดลอกข้อความ 📋</button>
              <button type="button" id="btnSave" onclick="sendToCalendar()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-200">ลงปฏิทิน & บันทึก 🗓️</button>
            </div>
          </form>

          <div class="mx-4 mt-2 mb-8 bg-white rounded-3xl p-5 border-2 border-dashed border-slate-200">
            <div class="flex items-center justify-between mb-3">
              <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Message Preview</p>
              <span class="px-2 py-0.5 rounded-full bg-green-100 text-green-600 text-[9px] font-bold">Auto-sync</span>
            </div>
            <div id="textPreview" class="text-[14px] leading-relaxed whitespace-pre-wrap text-slate-500 italic min-h-[60px]">ระบุชื่อลูกค้าเพื่อสร้างข้อความ...</div>
          </div>
        </div>
        <div id="section-queue" class="hidden space-y-4">
          <div class="bg-pink-50 p-4 rounded-2xl">
            <div class="flex gap-2">
              <input type="date" id="queueDateFilter" onchange="fetchQueue(true)" class="flex-1 rounded-xl border-pink-100 border p-2 text-sm focus:outline-none" />
            </div>
          </div>
          <div id="queueList" class="space-y-3"></div>
        </div>

        <div id="section-history" class="hidden space-y-3">
          <div class="flex justify-between items-center mb-2">
            <h3 class="font-bold text-gray-700 text-sm">รายการล่าสุด</h3>
            <button onclick="clearHistory()" class="hidden text-[10px] text-red-500 font-bold">ล้างประวัติ</button>
          </div>
          <div id="historyList" class="space-y-3"></div>
        </div>
      </div>
    </div>

    <script>
      const scriptURL = "https://script.google.com/macros/s/AKfycbyiu1_ko_X7b1YduNsLKI3m2phRAn07ZkF4HWpNjHdZF8wPyTrE10fGedRQlb_1RAgb/exec";
      const STORAGE_KEY = "marizaHistoryData";
      let queueCache = {};

      document.addEventListener("DOMContentLoaded", () => {
        const bangkokDate = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Bangkok" }).format(new Date());
        document.getElementById("date").value = bangkokDate;
        document.getElementById("queueDateFilter").value = bangkokDate;
        updatePreview();
      });

      function switchTab(tab) {
        document.getElementById("section-booking").classList.toggle("hidden", tab !== "booking");
        document.getElementById("section-queue").classList.toggle("hidden", tab !== "queue");
        document.getElementById("section-history").classList.toggle("hidden", tab !== "history");
        const activeClass = "flex-1 py-4 font-bold tab-active";
        const inactiveClass = "flex-1 py-4 font-bold text-gray-400";
        document.getElementById("tab-booking").className = tab === "booking" ? activeClass : inactiveClass;
        document.getElementById("tab-queue").className = tab === "queue" ? activeClass : inactiveClass;
        document.getElementById("tab-history").className = tab === "history" ? activeClass : inactiveClass;
        if (tab === "history") loadHistory();
        if (tab === "queue") fetchQueue(false);
      }

      function handleNameInput() {
        const input = document.getElementById("custName").value.toLowerCase();
        const suggestionsBox = document.getElementById("suggestions");
        updatePreview();
        if (input.length < 1) { suggestionsBox.classList.add("hidden"); return; }
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const matches = history.filter((item, index, self) => item.name.toLowerCase().includes(input) && self.findIndex((t) => t.name === item.name) === index).slice(0, 5);
        if (matches.length > 0) {
          suggestionsBox.innerHTML = matches.map((data) => `<div onclick="fillData('${data.name}', '${data.phone}', '${data.locType || "default"}')" class="p-3 hover:bg-pink-50 cursor-pointer border-b border-gray-50 last:border-0 text-sm flex justify-between items-center"><span class="font-bold text-pink-600">${data.name}</span> <span class="text-gray-400 text-[10px]">${data.phone}</span></div>`).join("");
          suggestionsBox.classList.remove("hidden");
        } else { suggestionsBox.classList.add("hidden"); }
      }

      function validatePhone(input) {
        input.value = input.value.replace(/[^0-9]/g, "");
        if (input.value.length > 10) { input.value = input.value.slice(0, 10); }
      }

      // ฟังก์ชันสำหรับเช็คเบอร์โทร 10 หลัก
      function checkPhone() {
        const phone = document.getElementById("custPhone").value;
        if (phone.length !== 10) {
          alert("❌ กรุณากรอกเบอร์โทรศัพท์ให้ครบ 10 หลัก");
          document.getElementById("custPhone").focus();
          return false;
        }
        return true;
      }

      function fillData(name, phone, locType) {
        document.getElementById("custName").value = name;
        document.getElementById("custPhone").value = phone;
        document.getElementById("locationType").value = locType;
        document.getElementById("suggestions").classList.add("hidden");
        updateDeposit(); updatePreview();
      }

      function updateDeposit() {
        const isOnsite = document.getElementById("locationType").value === "onsite";
        document.getElementById("deposit").value = isOnsite ? 1000 : 500;
      }

      function generateData() {
        const getValue = (id, fallback) => document.getElementById(id).value || fallback;
        const lang = getValue("msgLang", "th");
        const name = getValue("custName", "...");
        const phone = getValue("custPhone", "...");
        const service = getValue("serviceType", "ต่อขนตา");
        const dateInput = document.getElementById("date").value;
        const [y, m, d] = dateInput ? dateInput.split("-") : ["xxxx", "xx", "xx"];
        const dateStr = `${d}/${m}/${y}`;
        const time = getValue("time", "--:--");
        const platform = document.getElementById("platform").value;
        const price = getValue("price", "ราคา");
        const deposit = document.getElementById("deposit").value;
        const locType = document.getElementById("locationType").value;
        let text = lang === "th" ? `ยืนยันการจอง💓\nมัดจำ ${deposit} บาท\n\nชื่อ: ${name}\nเบอร์: ${phone}\nบริการ: ${service}\nวันที่: ${dateStr}\nเวลา: ${time}\n\n` : `Confirm Booking💓\nDeposit: ${deposit} THB\n\nName: ${name}\nPhone: ${phone}\nService: ${service}\nDate: ${dateStr}\nTime: ${time}\n\n`;
        if (locType === "onsite") { text += lang === "th" ? `- เวลาอาจคลาดเคลื่อนตามการจราจรค่า🙏\n🥰 แล้วพบกันค่า 🫶💖` : `- Traffic may affect time ka🙏\n🥰 See you soon! 🫶💖`; } 
        else { text += lang === "th" ? `- หากนำรถมาแจ้งเลขห้อง 964 ค่า\n- ถึงแล้วนั่งรอ lobby เดี๋ยวมีพี่ช่างมารับค่า\n- Oops! ถ้าเลทมาไม่เกิน 15 นาที นะคะ🥰 แล้วพบกันนะค่า🫶💖` : `- Room 964 ka\n- Wait at Lobby ka💖\n- Late max 15 mins ka🫶💖`; }
        const calLine = `${name} | ${platform} | ${phone} | ${price}(มัดจำ${deposit}) | ${service}`;
        return { text, calLine, name, phone, locType, dateInput, time, dateStr };
      }

      function updatePreview() { document.getElementById("textPreview").innerText = generateData().text || "รอข้อมูล..."; }

      async function generateAndCopy() {
        if (!checkPhone()) return; // เช็คเบอร์โทร
        await navigator.clipboard.writeText(generateData().text);
        alert("คัดลอกเรียบร้อย! ✅");
      }

      async function sendToCalendar() {
        if (!checkPhone()) return; // เช็คเบอร์โทร
        const form = document.getElementById("bookingForm");
        if (!form.checkValidity()) { form.reportValidity(); return; }
        const btn = document.getElementById("btnSave");
        btn.innerHTML = '<div class="fast-loader mx-auto"></div>'; btn.disabled = true;
        const data = generateData();
        saveToHistory(data);
        const formData = new FormData();
        formData.append("date", data.dateInput); formData.append("time", data.time); formData.append("calendarLine", data.calLine);
        try {
          await fetch(scriptURL, { method: "POST", body: formData, mode: "no-cors" });
          alert("ลงปฏิทินสำเร็จ! 🗓️");
          delete queueCache[data.dateInput]; form.reset();
          const bangkokDate = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Bangkok" }).format(new Date());
          document.getElementById("date").value = bangkokDate;
          updateDeposit(); updatePreview();
        } catch (e) { alert("ส่งไม่สำเร็จ กรุณาลองใหม่"); } 
        finally { btn.innerText = "ลงปฏิทิน & บันทึก 🗓️"; btn.disabled = false; }
      }

      async function fetchQueue(forceRefresh = false) {
        const list = document.getElementById("queueList");
        const selectedDate = document.getElementById("queueDateFilter").value;
        if (!selectedDate) return;
        if (queueCache[selectedDate] && !forceRefresh) { renderQueue(queueCache[selectedDate]); silentUpdate(selectedDate); return; }
        list.innerHTML = '<div class="flex justify-center py-10"><div class="fast-loader"></div></div>';
        try {
          const url = `${scriptURL}?action=getQueue&date=${selectedDate}&_=${new Date().getTime()}`;
          const response = await fetch(url); const data = await response.json();
          queueCache[selectedDate] = data; renderQueue(data);
        } catch (e) { list.innerHTML = '<p class="text-center py-10 text-red-400">ไม่สามารถโหลดข้อมูลคิวได้</p>'; }
      }

      async function silentUpdate(date) {
        try {
          const url = `${scriptURL}?action=getQueue&date=${date}&_=${new Date().getTime()}`;
          const response = await fetch(url); const data = await response.json();
          queueCache[date] = data; renderQueue(data);
        } catch (e) {}
      }

      function renderQueue(data) {
        const list = document.getElementById("queueList");
        if (!data || data.length === 0) { list.innerHTML = '<p class="text-center py-10 text-gray-400 text-xs">ไม่มีคิวงาน</p>'; return; }
        list.innerHTML = data.map((item, index) => {
          const isDone = item.status === "DONE";
          const parts = item.title.split(" | ");
          return `<div class="queue-item overflow-hidden transition-all ${isDone ? "bg-gray-50 opacity-60" : "bg-white"}">
                    <div onclick="toggleAccordion('desc-${index}')" class="p-4 flex justify-between items-center cursor-pointer active:bg-pink-50">
                        <div class="flex gap-3 items-center overflow-hidden">
                            <div class="${isDone ? "text-gray-400 bg-gray-200" : "text-pink-600 bg-pink-50"} font-bold text-xs p-2 rounded-xl min-w-[55px] text-center">${item.startTime}</div>
                            <div class="overflow-hidden">
                                <div class="text-gray-800 font-bold text-sm truncate ${isDone ? "line-through" : ""}">${parts[0] || "Unknown"}</div>
                                <div class="text-[10px] text-gray-400 truncate w-full max-w-[150px]">${item.title}</div>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleStatus('${item.id}', '${item.status}')" class="p-2 rounded-full ${isDone ? "bg-green-500 text-white" : "bg-pink-100 text-pink-500"}"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg></button>
                    </div>
                    <div id="desc-${index}" class="hidden bg-pink-200/20 border-t border-dashed border-pink-100 p-4">
                        <div class="grid grid-cols-2 gap-3 text-[11px]">
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Phone</span><span class="text-gray-700 font-bold">${parts[2] || "-"}</span></div>
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Price</span><span class="text-pink-600 font-bold">${parts[3] || "-"}</span></div>
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Platform</span><span class="text-gray-700 font-bold">${parts[1] || "-"}</span></div>
                            <div class="bg-white p-2 rounded-lg border border-pink-50"><span class="text-gray-400 block text-[9px]">Service</span><span class="text-gray-700 font-bold">${parts[4] || "-"}</span></div>
                        </div>
                    </div>
                </div>`;
        }).join("");
      }

      function toggleAccordion(id) { document.getElementById(id).classList.toggle("hidden"); }

      async function toggleStatus(eventId, currentStatus) {
        const newStatus = currentStatus === "DONE" ? "[WAIT]" : "[DONE]";
        const formData = new FormData(); formData.append("action", "updateStatus"); formData.append("eventId", eventId); formData.append("status", newStatus);
        try { await fetch(scriptURL, { method: "POST", body: formData, mode: "no-cors" }); fetchQueue(true); } catch (e) { alert("Error updating status"); }
      }

      function saveToHistory(data) {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        history.unshift({ name: data.name, phone: data.phone, locType: data.locType, line: data.calLine, bookingDate: data.dateStr, bookingTime: data.time });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 100)));
      }

      function loadHistory() {
        const list = document.getElementById("historyList");
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (history.length === 0) { list.innerHTML = '<p class="text-center py-10 text-gray-300 text-xs">ไม่มีข้อมูลประวัติ</p>'; return; }
        list.innerHTML = history.map((item) => `<div class="p-3 bg-pink-50 rounded-xl text-[11px] border border-pink-100 shadow-sm flex justify-between items-center"><div class="truncate mr-2"><span class="font-bold">${item.name}</span> | ${item.line}</div><button onclick="navigator.clipboard.writeText('${item.line}'); alert('คัดลอกแล้ว!')" class="text-pink-600 font-bold px-2">📋</button></div>`).join("");
      }

      function clearHistory() { if (confirm("ยืนยันการล้างประวัติทั้งหมด?")) { localStorage.removeItem(STORAGE_KEY); loadHistory(); } }
    </script>
  </body>
</html>
